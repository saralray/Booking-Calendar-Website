apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-calendar
  namespace: booking-calendar
  labels:
    app: booking-calendar
spec:
  # Replica count is owned by the HorizontalPodAutoscaler (see hpa.yaml).
  selector:
    matchLabels:
      app: booking-calendar
  template:
    metadata:
      labels:
        app: booking-calendar
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: booking-calendar
          image: ghcr.io/saralray/booking-calendar-website:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: booking-calendar-config
          env:
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: booking-calendar-secret
                  key: GOOGLE_API_KEY
            # Fallback credentials — optional because the app prefers the
            # mounted service-account.json file (see volumeMounts below).
            - name: GOOGLE_SERVICE_ACCOUNT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: booking-calendar-secret
                  key: GOOGLE_SERVICE_ACCOUNT_EMAIL
                  optional: true
            - name: GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: booking-calendar-secret
                  key: GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY
                  optional: true
          volumeMounts:
            - name: service-account
              mountPath: /app/secrets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: service-account
          secret:
            secretName: booking-calendar-secret
            items:
              - key: service-account.json
                path: service-account.json
