apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: booking-calendar
  namespace: booking-calendar
spec:
  # Requires an ingress controller (e.g. ingress-nginx) in the cluster.
  ingressClassName: nginx
  rules:
    # Replace with your real hostname before deploying.
    - host: booking.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: booking-calendar
                port:
                  number: 8080
